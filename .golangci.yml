version: "2"
linters:
  enable:
    - errcheck
    - govet
    - ineffassign
    - staticcheck
    - unused
    - misspell
    - bodyclose
    - gosec
  settings:
    errcheck:
      # Ignoring the error from these is idiomatic (deferred cleanup / best-effort
      # writes to an already-failing stream).
      exclude-functions:
        - (io.Closer).Close
        - fmt.Fprint
        - os.Remove
        - (github.com/vortexui/vortexui/internal/core.CoreDriver).Stop
    gosec:
      excludes:
        - G115 # integer conversions (ports/quotas/counters) — noisy false positives
        - G117 # struct field name matches "secret" pattern — false positive on WARP config
        - G204 # subprocess: launching the configured core binary is the design
        - G301 # dir perms 0755 on asset/cert dirs is intentional
        - G304 # file inclusion: cert/config paths come from trusted config
        - G402 # TLS InsecureSkipVerify: we do CA validation via VerifyConnection
  exclusions:
    rules:
      # echo's middleware.Logger is deprecated but intentional; QF1006 is a style
      # quickfix, not a correctness issue.
      - linters: [staticcheck]
        text: "SA1019|QF1006|QF1001|QF1003"
      # Tests favor readability over exhaustive error checks on fakes.
      - path: _test\.go
        linters: [errcheck, gosec]
      # Generated code is not ours to lint.
      - path: internal/transport/genv1/
        linters: [staticcheck, govet]
      - path: internal/platform/postgres/db/
        linters: [staticcheck, unused]
