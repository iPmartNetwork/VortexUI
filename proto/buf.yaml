version: v2
modules:
  - path: .
lint:
  use:
    - STANDARD
  except:
    - PACKAGE_VERSION_SUFFIX
    # We intentionally share a single Ack reply across mutating RPCs and stream
    # the domain TrafficDelta directly, rather than minting empty wrapper types.
    - RPC_REQUEST_RESPONSE_UNIQUE
    - RPC_RESPONSE_STANDARD_NAME
breaking:
  use:
    - FILE
