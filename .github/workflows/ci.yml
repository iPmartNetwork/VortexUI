name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    services:
      db:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: vortex
          POSTGRES_PASSWORD: vortex
          POSTGRES_DB: vortex
        ports: ["5432:5432"]
        options: >-
          --health-cmd "pg_isready -U vortex"
          --health-interval 5s --health-timeout 3s --health-retries 10
      redis:
        image: redis:7-alpine
        ports: ["6379:6379"]
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s --health-timeout 3s --health-retries 10
    env:
      # With these set, the gated integration tests run for real in CI.
      VORTEX_TEST_DB: postgres://vortex:vortex@localhost:5432/vortex?sslmode=disable
      VORTEX_TEST_REDIS: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - name: go vet
        run: go vet ./...
      - name: Test (race + integration)
        run: go test -race -count=1 -coverprofile=coverage.out ./...
      - name: Coverage summary
        run: go tool cover -func=coverage.out | tail -1

  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.26"
          cache: true
      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest

  images:
    runs-on: ubuntu-latest
    needs: [test, lint]
    strategy:
      matrix:
        target: [panel, node]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build ${{ matrix.target }} image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          target: ${{ matrix.target }}
          push: false
          tags: vortexui/${{ matrix.target }}:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max
