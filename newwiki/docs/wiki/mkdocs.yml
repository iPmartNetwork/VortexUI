site_name: VortexUI Documentation
site_url: https://ipmartnetwork.github.io/VortexUI/
site_description: Next-Generation Proxy Management Panel Documentation
site_author: ali (zeus)

repo_name: iPmartNetwork/VortexUI
repo_url: https://github.com/iPmartNetwork/VortexUI

theme:
  name: material
  language: en
  palette:
    - scheme: slate
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
    - scheme: default
      primary: deep purple
      accent: cyan
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.expand
    - navigation.top
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.tabs.link
  icon:
    repo: fontawesome/brands/github

plugins:
  - search
  - i18n:
      default_language: en
      languages:
        - locale: en
          name: English
          build: true
          default: true
        - locale: fa
          name: فارسی
          build: true
          nav_translations:
            Home: خانه
            Introduction: معرفی
            Installation: نصب
            First Steps: شروع سریع
            Dashboard: داشبورد
            Users: کاربران
            Nodes: نودها
            Network: شبکه
            Security: امنیت
            Plans & Payments: پلن‌ها و پرداخت
            Notifications: اعلان‌ها
            Settings: تنظیمات
            API Reference: مرجع API
            Protocols: پروتکل‌ها
            Operations: عملیات
            Troubleshooting: عیب‌یابی
            Changelog: تغییرات
            Menu & Usage Guide: راهنمای منوها و استفاده
        - locale: ar
          name: العربية
          build: true
        - locale: tr
          name: Türkçe
          build: true

extra:
  social:
    - icon: fontawesome/brands/github
      link: https://github.com/iPmartNetwork/VortexUI
    - icon: fontawesome/brands/telegram
      link: https://t.me/vortex_ui
  alternate:
    - name: English
      link: /en/
      lang: en
    - name: فارسی
      link: /fa/
      lang: fa
    - name: العربية
      link: /ar/
      lang: ar
    - name: Türkçe
      link: /tr/
      lang: tr

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.emoji:
      emoji_index: !!python/name:material.extensions.emoji.twemoji
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
  - tables
  - attr_list
  - md_in_html
  - toc:
      permalink: true

nav:
  - Home: index.md
  - Introduction: 01-introduction.md
  - Installation: 02-installation.md
  - First Steps: 03-first-steps.md
  - Dashboard: 04-dashboard.md
  - Users: 05-user-management.md
  - Nodes: 06-node-management.md
  - Network: 07-network-policy.md
  - Security: 08-security-administration.md
  - Plans & Payments: 09-plans-payments.md
  - Notifications: 10-notifications.md
  - Settings: 11-settings-backup.md
  - API Reference: 12-api-reference.md
  - Protocols: 13-protocols-config.md
  - Operations: 14-operations-maintenance.md
  - Troubleshooting: 15-troubleshooting-faq.md
  - Changelog: 16-changelog.md
  - Menu & Usage Guide: 17-menu-usage-guide.md

copyright: Copyright &copy; 2024-2026 ali (zeus) — VortexUI is open source under MIT License
