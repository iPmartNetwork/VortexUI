# Serves the VortexUI single-page app and reverse-proxies the API + subscription
# endpoints to the panel control plane. Used by deploy/web.Dockerfile.
server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # gzip for the static bundle.
    gzip on;
    gzip_types text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;

    # Control-plane API.
    location /api/ {
        proxy_pass http://panel:8080;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # WebSocket upgrade (live updates, if enabled).
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 3600s;
    }

    # Subscription delivery (clients fetch their config here).
    location /sub/ {
        proxy_pass http://panel:8080;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    location = /health {
        proxy_pass http://panel:8080;
    }

    # SPA fallback: every other path serves index.html so client routing works.
    location / {
        try_files $uri $uri/ /index.html;
    }
}
