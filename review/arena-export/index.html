rotocols, all nodes. Family groups, referral system, smart quota with fair-use tiers.","features.portal.title":"Self-Service Portal & Shop","features.portal.desc":"End-users login, view usage, purchase plans, open tickets. Per-reseller shops with ZarinPal, crypto, card-to-card.","features.reseller.title":"Reseller Platform","features.reseller.desc":"Wallet billing, sub-resellers, whitelabel branding, webhooks, policy limits, auto-suspend, scoped allowlists.","features.analytics.title":"Advanced Analytics","features.analytics.desc":"Geo-IP breakdown, top users, peak hours, world map heatmap, CSV export, real-time gauges and charts.","features.veltrix.title":"Veltrix Glass UI","features.veltrix.desc":"Collapsible sidebar, command palette (Ctrl+K), drag-&-drop dashboard widgets, dark/light animated transition.","features.cdn.title":"CDN & Relay Chains","features.cdn.desc":"Multi-hop paths with CDN, relay, and worker hops. Load balancers with 4 strategies and health probing.","features.federation.title":"Federation","features.federation.desc":"Sync users and nodes across multiple panels. Cross-panel resource sharing for large-scale deployments.","features.notifications.title":"Smart Notifications","features.notifications.desc":"Webhooks (HMAC-SHA256), Telegram Bot integration, quota alerts, SSE real-time events, auto-backup to S3.","features.security.title":"Security First","features.security.desc":"JWT + TOTP 2FA, RBAC roles, audit logs with diff, IP whitelists, account-sharing guard, geo-blocking.","dashboard.badge":"Dashboard Preview","dashboard.title.line1":"Beautiful","dashboard.title.line2":"Veltrix UI","dashboard.subtitle":"Glass-design dashboard with drag-&-drop widgets, real-time gauges, world map, command palette, and 8-language support.","dashboard.totalUsers":"Total Users","dashboard.onlineNodes":"Online Nodes","dashboard.todayTraffic":"Today Traffic","dashboard.activeConns":"Active Conns","dashboard.traffic24":"Traffic (24h)","dashboard.systemHealth":"Syste pot, or log-only modes. Telegram alerts on detection.","sec.ja3.title":"JA3 Fingerprint Validation","sec.ja3.desc":"Block connections based on TLS ClientHello fingerprints. Detect curl, Python, Go scanner tools automatically.","sec.decoy.title":"Decoy Website","sec.decoy.desc":"Proxy or static mode — serve a fake website to probers. Make your server look like a normal website to censors.","sec.doh.title":"DNS-over-HTTPS","sec.doh.desc":"Built-in DoH server preventing DNS leaks. Ad/malware blocking, custom blocklists, cache TTL configuration.","sec.warp.title":"WARP+ Integration","sec.warp.desc":"Route through Cloudflare WARP for clean IPs. Assign to routing rules for specific domains when node IP is flagged.","sec.cleanIp.title":"Clean-IP Scanner","sec.cleanIp.desc":"Find best CDN edge IPs by scanning and scoring on latency and packet loss. SSRF-protected — no internal scanning.","sec.sharing.title":"Account-Sharing Guard","sec.sharing.desc":"Background IP monitoring with device limits. Auto-detection, webhook alerts, or automatic user suspension.","sec.rbac.title":"RBAC & 2FA","sec.rbac.desc":"JWT + TOTP authentication, granular permission roles, personal access tokens with revocation and expiry.","sec.mtls.title":"mTLS Node Security","sec.mtls.desc":"Mutual TLS between panel and nodes. Auto-certificate exchange during enrollment. Encrypted gRPC transport.","sec.evasion.title":"Evasion Profiles","sec.evasion.desc":"Pre-configured anti-DPI bundles per country. Combine fragment, mux, fingerprint settings into reusable profiles.","cmp.badge":"How We Compare","cmp.title.line1":"VortexUI vs","cmp.title.line2":"The Rest","cmp.subtitle":"See why VortexUI leads in features, security, and scalability compared to other proxy management panels.","cmp.feature":"Feature","inst.badge":"Get Started in Minutes","inst.title.line1":"Install","inst.title.line2":"VortexUI","inst.subtitle":"One command to a fully working panel with HTTPS. Or use Docker, native build, or node agent — yo
